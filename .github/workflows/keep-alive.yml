name: keep-alive

on:
  schedule:
    # Every 3 days at 12:00 UTC — well within Supabase's 7-day inactivity pause threshold
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.cig.technology/api/v1/health)
          echo "Health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::API health returned $STATUS"
          fi

      - name: Ping DB keep-alive (prevents Supabase free-tier pause)
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.cig.technology/api/v1/health/db)
          echo "DB ping: $STATUS"
          if [ "$STATUS" = "503" ]; then
            echo "::error::Database unreachable — Supabase may be paused. Resume at https://supabase.com/dashboard"
            exit 1
          elif [ "$STATUS" != "200" ]; then
            echo "::warning::DB ping returned $STATUS — API may be down"
          fi
